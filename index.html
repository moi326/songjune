<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rolling Ball Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Three.js from CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
    </script>
</head>
<body>
    <div id="game-ui">
        <div id="score-container">
            <span id="score-label">SCORE</span>
            <span id="score-value">0</span>
            <div id="coin-container">
                <span id="coin-icon">🪙</span>
                <span id="coin-value">0</span>
            </div>
        </div>
        
        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <h1 id="title">ROLLING BALL 3D</h1>
                <p id="instruction">Press <span class="highlight">SPACE</span> to Start</p>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay" style="display: none; pointer-events: auto;">
            <div class="overlay-content">
                <h1>GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <div id="revive-container" style="display: none; margin-top: 1rem;">
                    <button id="revive-button" class="action-button">REVIVE (300 🪙)</button>
                </div>
                <p id="instruction">Press <span class="highlight">SPACE</span> to Restart</p>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
